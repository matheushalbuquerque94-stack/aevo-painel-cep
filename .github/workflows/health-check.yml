name: Health Check — Huawei Sessions

# Roda 2x/dia: 12 BRT (15 UTC) e 18 BRT (21 UTC)
# Detecta proativamente quando uma conta Huawei para de funcionar
# ANTES do ETL noturno falhar.
#
# Se aevomaster falhar → workflow falha → GitHub envia email/notification
# (configurar notificacoes em Settings -> Notifications)
on:
  schedule:
    - cron: "0 15 * * *"   # 12:00 BRT
    - cron: "0 21 * * *"   # 18:00 BRT
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install psycopg2-binary pandas requests pycryptodome pytz bcrypt playwright
          playwright install --with-deps chromium

      - name: Run health check
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_REGION: ${{ secrets.SUPABASE_REGION }}
          AEVO_HOST: ${{ secrets.AEVO_HOST }}
          AEVO_PORT: ${{ secrets.AEVO_PORT }}
          AEVO_DB: ${{ secrets.AEVO_DB }}
          AEVO_USER: ${{ secrets.AEVO_USER }}
          AEVO_PASSWORD: ${{ secrets.AEVO_PASSWORD }}
          TZ: "America/Sao_Paulo"
        run: |
          python -m huawei.health_check
